<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aiyan Embroidery And Hand Works | Bangalore</title>
    <script>
      // Automatically redirect to add a trailing slash if on GitHub Pages and missing it,
      // which is the #1 cause of blank pages when relative asset paths fail to load.
      if (window.location.hostname.endsWith('.github.io') && !window.location.pathname.endsWith('/')) {
        var parts = window.location.pathname.split('/');
        var lastPart = parts[parts.length - 1];
        if (lastPart && !lastPart.includes('.')) {
          window.location.replace(window.location.pathname + '/' + window.location.search + window.location.hash);
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
